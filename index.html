<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Color Generator</title>
  <script type="module" src="/src/main.js"></script>
</head>
<body>
  <div class="container">
    <h1>Random Color Generator</h1>
    <p class="subtitle">Click the box to generate a random color and copy its hex code.</p>

    <div class="color-card" id="colorCard">
      <div class="color-box" id="colorBox" title="Click to generate a new color"></div>
      <p class="color-code" id="colorCode">#000000</p>
    </div>

    <button id="copyBtn">Copy Hex Code</button>
    <p class="message" id="message"></p>
  </div>
</body>
</html>
